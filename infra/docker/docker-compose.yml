# ============================================================
# Docker Compose — Development Environment
# Study Platform: PostgreSQL + MongoDB + Redis + API Server
# ============================================================

services:
  # ─── PostgreSQL ──────────────────────────────────────────
  postgres:
    image: postgres:16-alpine
    container_name: kd-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-kd_study}
      POSTGRES_USER: ${POSTGRES_USER:-kd_user}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-kd_secret_dev}
    ports:
      - "${POSTGRES_PORT:-5432}:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ../../server/db/migrations:/docker-entrypoint-initdb.d:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-kd_user} -d ${POSTGRES_DB:-kd_study}"]
      interval: 5s
      timeout: 5s
      retries: 5

  # ─── MongoDB ─────────────────────────────────────────────
  mongo:
    image: mongo:7-jammy
    container_name: kd-mongo
    restart: unless-stopped
    environment:
      MONGO_INITDB_ROOT_USERNAME: ${MONGO_USER:-kd_user}
      MONGO_INITDB_ROOT_PASSWORD: ${MONGO_PASSWORD:-kd_secret_dev}
      MONGO_INITDB_DATABASE: ${MONGO_DB:-kd_content}
    ports:
      - "${MONGO_PORT:-27017}:27017"
    volumes:
      - mongo_data:/data/db
      - ./mongo-init.js:/docker-entrypoint-initdb.d/01-init.js:ro
    healthcheck:
      test: ["CMD", "mongosh", "--eval", "db.adminCommand('ping')"]
      interval: 5s
      timeout: 5s
      retries: 5

  # ─── Redis ──────────────────────────────────────────────
  redis:
    image: redis:7-alpine
    container_name: kd-redis
    restart: unless-stopped
    command: redis-server --appendonly yes --maxmemory 256mb --maxmemory-policy allkeys-lru
    ports:
      - "${REDIS_PORT:-6379}:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 5

  # ─── API Server ────────────────────────────────────────────
  api:
    build:
      context: ../../
      dockerfile: infra/docker/Dockerfile.dev
    container_name: kd-api
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
      mongo:
        condition: service_healthy
      redis:
        condition: service_healthy
    environment:
      NODE_ENV: development
      PORT: 3000
      HOST: 0.0.0.0
      LOG_LEVEL: debug
      POSTGRES_URL: postgresql://${POSTGRES_USER:-kd_user}:${POSTGRES_PASSWORD:-kd_secret_dev}@postgres:5432/${POSTGRES_DB:-kd_study}
      MONGO_URL: mongodb://${MONGO_USER:-kd_user}:${MONGO_PASSWORD:-kd_secret_dev}@mongo:27017/${MONGO_DB:-kd_content}?authSource=admin
      REDIS_URL: redis://redis:6379
      CORS_ORIGIN: ${CORS_ORIGIN:-http://localhost:8081}
    ports:
      - "${API_PORT:-3000}:3000"
    volumes:
      - ../../server/src:/app/server/src:ro
      - ../../packages:/app/packages:ro

volumes:
  postgres_data:
  mongo_data:
  redis_data:
